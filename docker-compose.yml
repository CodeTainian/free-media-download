services:
  api:
    build:
      context: ./free-media-download-backend
    environment:
      SAVEBOLT_DATA_DIR: /data/jobs
      SAVEBOLT_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      SAVEBOLT_MAX_BATCH_ITEMS: "10"
      SAVEBOLT_MAX_FILE_BYTES: "2147483648"
      SAVEBOLT_MAX_BUNDLE_BYTES: "4294967296"
      SAVEBOLT_MAX_DURATION_SECONDS: "21600"
      SAVEBOLT_WORKER_CONCURRENCY: "2"
      SAVEBOLT_JOB_TTL_SECONDS: "1800"
      SAVEBOLT_ANONYMOUS_BROWSER_COOKIES: "true"
      SAVEBOLT_BROWSER_IMPERSONATE: chrome
      SAVEBOLT_BROWSER_SESSION_TTL_SECONDS: "1200"
    ports:
      - "8000:8000"
    volumes:
      - savebolt-jobs:/data/jobs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: ./free-media-download-frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  savebolt-jobs:
